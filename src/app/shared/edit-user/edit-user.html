<div class="user__header">
  <h2>Dein Profil bearbeiten</h2>
  <button class="user__icon-close" mat-icon-button (click)="dialogRef.close()">
    <mat-icon>close</mat-icon>
  </button>
</div>
<div class="avatar-container">
  <img class="user-avatar" [src]="user.avatar" alt="User Avatar" />
</div>
<label class="user-edit">
  <div class="user-edit__header">
    <mat-icon fontSet="material-symbols-outlined">account_circle</mat-icon>
    <span>Vollständiger Name</span>
  </div>
  <input matInput [(ngModel)]="user.name" class="user-edit__input" />
</label>
<div class="buttons">
  <button class="btn btn--secondary" (click)="dialogRef.close()">Abbrechen</button>
  <button class="btn btn--primary" (click)="saveUser()">Speichern</button>
</div>
