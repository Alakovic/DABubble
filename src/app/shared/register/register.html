<section class="theme">
  <div class="container">
    <div class="register">
      <div class="register__card">
        <div class="register__card-header">
          <button routerLink="" class="btn btn--back"><mat-icon>arrow_back</mat-icon></button>
          <h1 class="register__card-title">Konto erstellen</h1>
          <p class="register__card-subtitle">
            Mit Ihrem Namen und Ihrer E-Mail-Adresse haben Sie Ihr neues DABubble-Konto.
          </p>
        </div>
        <form class="register__card-form">
          <label class="login__card-form-field">
            <mat-icon matPrefix class="login__icon material-symbols-outlined">person</mat-icon>
            <input class="login__input" matInput type="text" placeholder="Name und Nachname" />
          </label>
          <label class="login__card-form-field">
            <mat-icon matPrefix class="login__icon material-symbols-outlined">mail</mat-icon>
            <input
              class="login__input"
              matInput
              type="email"
              placeholder="beispielname@email.com"
            />
          </label>
          <label class="login__card-form-field">
            <mat-icon matPrefix class="login__icon material-symbols-outlined">lock</mat-icon>
            <input class="login__input" matInput type="password" placeholder="Passwort" />
          </label>
          <label class="register__checkbox">
            <input type="checkbox" />
            <span>
              Ich stimme der
              <a routerLink="/datenschutz">Datenschutzerklärung</a>
              zu.
            </span>
          </label>
          <button class="btn btn--primary" type="submit">Weiter</button>
        </form>
      </div>
      <div class="login__legal-buttons">
        <button type="button" class="btn btn--tertiary">Impressum</button>
        <button type="button" class="btn btn--tertiary">Datenschutz</button>
      </div>
    </div>
  </div>
</section>
