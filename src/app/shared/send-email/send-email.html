<section class="theme">
  <div class="container">
    <div class="email">
      <div class="email__card">
        <div class="email__card-header">
          <button routerLink="" class="btn btn--back"><mat-icon>arrow_back</mat-icon></button>
          <h1 class="email__card-title">Passwort zurücksetzen</h1>
          <p class="email__card-subtitle">Bitte geben Sie Ihre E-Mail-Adresse ein.</p>
        </div>
        <form class="email__card-form">
          <label class="email__card-form-field">
            <mat-icon matPrefix class="email__icon material-symbols-outlined">mail</mat-icon>
            <input
              class="email__input"
              matInput
              type="email"
              placeholder="beispielname@email.com"
            />
          </label>
          <p class="email__card-info">
            Wir senden Ihnen eine E-Mail, über die Sie Ihr Passwort ändern können.
          </p>
          <button class="btn btn--primary" type="submit">E-Mail senden</button>
        </form>
      </div>
      <div class="email__legal-buttons">
        <button type="button" class="btn btn--tertiary">Impressum</button>
        <button type="button" class="btn btn--tertiary">Datenschutz</button>
      </div>
    </div>
  </div>
</section>
