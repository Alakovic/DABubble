<div class="users">
  <label class="users__label">
    <button class="btn btn--toggle-channels" (click)="toggleUsers()">
      <mat-icon> {{ usersOpen() ? 'arrow_drop_down' : 'arrow_drop_up' }} </mat-icon>
    </button>
    <mat-icon fontSet="material-symbols-outlined">account_circle</mat-icon>
    <span class="users__title">Directnachrichten</span>
  </label>
  @if(usersOpen()){
  <div class="users__list">
    @for (user of userService.allUsers(); track user.id) {
      <button class="btn btn--user" (click)="startChat(user)">
        <div class="users__avatar-wrapper"   [class.users__avatar-wrapper--offline]="user.status !== 'online'">
        <img class="btn__icon btn__icon--user" [src]="user.avatar" alt="{{ user.name }}" />
        </div>
        <div class="btn__text btn__text--user">
          {{ user.name }}
          @if (user.email === userService.loggedUser()?.email) {
            <span class="users__sufix">(Du)</span>
          }
        </div>
      </button>
    }
  </div>
  }
</div>
