<section class="theme">
    <div class="workspace">
      <div class="workspace__header">
        <img src="/assets/img/logo/logo_w_text.svg" alt="Workspace Header" class="workspace__header-logo" />
        <label class="workspace__header-search">
          <input
            class="workspace__header-input"
            matInput
            type="search"
            placeholder="Devspace durchsuchen"
          />
          <mat-icon matPrefix class="workspace__header-icon material-symbols-outlined">search</mat-icon>
          </label>
          <div class="workspace__header-loggedUser">
            <span class="workspace__header-loggedUser-name">{{ loggedUser()?.name }}</span>
            <img [src] = "loggedUser()?.avatar"   alt="Avatar" class="workspace__header-avatar"/>
            <mat-icon matPrefix class="workspace__header-icon material-symbols-outlined">keyboard_arrow_down</mat-icon>
        </div>
      </div>
    </div>
</section>
